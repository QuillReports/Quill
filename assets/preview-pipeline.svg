<svg width="900" height="480" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrW" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L10,3 z" fill="#c8a43a"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="url(#darkBg)"/>

  <!-- Header -->
  <text x="450" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="bold" fill="#c8a43a" text-anchor="middle" filter="url(#glow3)">QUILL PIPELINE</text>
  <text x="450" y="70" font-family="-apple-system, Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">How raw data becomes a polished DeFi report</text>
  <line x1="100" y1="84" x2="800" y2="84" stroke="#374151" stroke-width="1"/>

  <!-- === STEP BOXES === -->

  <!-- Step 1: FETCH -->
  <rect x="40" y="108" width="140" height="120" rx="10" fill="url(#stepGrad)" stroke="#4b5563" stroke-width="1.5"/>
  <rect x="40" y="108" width="140" height="36" rx="10" fill="#1d4ed8" opacity="0.7"/>
  <rect x="40" y="130" width="140" height="14" fill="#1d4ed8" opacity="0.7"/>
  <text x="110" y="132" font-family="-apple-system, Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">1  FETCH</text>
  <text x="110" y="158" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">DefiLlama TVL</text>
  <text x="110" y="174" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">CoinGecko prices</text>
  <text x="110" y="190" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Protocol volumes</text>
  <text x="110" y="210" font-family="'Courier New', monospace" font-size="9" fill="#60a5fa" text-anchor="middle">fetch_protocol_data()</text>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="168" x2="218" y2="168" stroke="#c8a43a" stroke-width="2" marker-end="url(#arrW)"/>

  <!-- Step 2: ANALYZE -->
  <rect x="220" y="108" width="140" height="120" rx="10" fill="url(#stepGrad)" stroke="#4b5563" stroke-width="1.5"/>
  <rect x="220" y="108" width="140" height="36" rx="10" fill="#7c3aed" opacity="0.7"/>
  <rect x="220" y="130" width="140" height="14" fill="#7c3aed" opacity="0.7"/>
  <text x="290" y="132" font-family="-apple-system, Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">2  ANALYZE</text>
  <text x="290" y="158" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">TVL trends</text>
  <text x="290" y="174" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Price movements</text>
  <text x="290" y="190" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Volume leaders</text>
  <text x="290" y="210" font-family="'Courier New', monospace" font-size="9" fill="#c084fc" text-anchor="middle">buildTvlSection()</text>

  <!-- Arrow 2→3 -->
  <line x1="360" y1="168" x2="398" y2="168" stroke="#c8a43a" stroke-width="2" marker-end="url(#arrW)"/>

  <!-- Step 3: WRITE (Claude) -->
  <rect x="400" y="108" width="140" height="120" rx="10" fill="url(#stepGrad)" stroke="#c8a43a" stroke-width="2"/>
  <rect x="400" y="108" width="140" height="36" rx="10" fill="#92400e" opacity="0.9"/>
  <rect x="400" y="130" width="140" height="14" fill="#92400e" opacity="0.9"/>
  <text x="470" y="132" font-family="-apple-system, Arial, sans-serif" font-size="13" font-weight="bold" fill="#fcd34d" text-anchor="middle">3  CLAUDE</text>
  <text x="470" y="158" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">Writes narrative</text>
  <text x="470" y="174" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">Adds context</text>
  <text x="470" y="190" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">Spots patterns</text>
  <text x="470" y="210" font-family="'Courier New', monospace" font-size="9" fill="#fcd34d" text-anchor="middle">claude-opus-4-6</text>

  <!-- Arrow 3→4 -->
  <line x1="540" y1="168" x2="578" y2="168" stroke="#c8a43a" stroke-width="2" marker-end="url(#arrW)"/>

  <!-- Step 4: COMPILE -->
  <rect x="580" y="108" width="140" height="120" rx="10" fill="url(#stepGrad)" stroke="#4b5563" stroke-width="1.5"/>
  <rect x="580" y="108" width="140" height="36" rx="10" fill="#065f46" opacity="0.9"/>
  <rect x="580" y="130" width="140" height="14" fill="#065f46" opacity="0.9"/>
  <text x="650" y="132" font-family="-apple-system, Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">4  COMPILE</text>
  <text x="650" y="158" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Merge sections</text>
  <text x="650" y="174" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Add metadata</text>
  <text x="650" y="190" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Word count</text>
  <text x="650" y="210" font-family="'Courier New', monospace" font-size="9" fill="#6ee7b7" text-anchor="middle">compile_report()</text>

  <!-- Arrow 4→5 -->
  <line x1="720" y1="168" x2="758" y2="168" stroke="#c8a43a" stroke-width="2" marker-end="url(#arrW)"/>

  <!-- Step 5: OUTPUT -->
  <rect x="760" y="108" width="110" height="120" rx="10" fill="url(#stepGrad)" stroke="#c8a43a" stroke-width="2" filter="url(#glow3)"/>
  <rect x="760" y="108" width="110" height="36" rx="10" fill="#c8a43a" opacity="0.9"/>
  <rect x="760" y="130" width="110" height="14" fill="#c8a43a" opacity="0.9"/>
  <text x="815" y="132" font-family="-apple-system, Arial, sans-serif" font-size="13" font-weight="bold" fill="#111827" text-anchor="middle">5  OUTPUT</text>
  <text x="815" y="158" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Markdown file</text>
  <text x="815" y="174" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">JSON export</text>
  <text x="815" y="190" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Console print</text>
  <text x="815" y="210" font-family="'Courier New', monospace" font-size="9" fill="#c8a43a" text-anchor="middle">printReport()</text>

  <!-- === REPORT TYPES SECTION === -->
  <text x="450" y="270" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle" letter-spacing="2">REPORT TYPES</text>

  <!-- Type cards -->
  <rect x="80" y="286" width="220" height="70" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <rect x="80" y="286" width="4" height="70" rx="2" fill="#3b82f6"/>
  <text x="100" y="312" font-family="-apple-system, Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Weekly Digest</text>
  <text x="100" y="330" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#9ca3af">Full ecosystem snapshot.</text>
  <text x="100" y="346" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#9ca3af">Every 7 days.</text>

  <rect x="340" y="286" width="220" height="70" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <rect x="340" y="286" width="4" height="70" rx="2" fill="#8b5cf6"/>
  <text x="360" y="312" font-family="-apple-system, Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Protocol Deep Dive</text>
  <text x="360" y="330" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#9ca3af">Single protocol analysis.</text>
  <text x="360" y="346" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#9ca3af">On demand.</text>

  <rect x="600" y="286" width="220" height="70" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <rect x="600" y="286" width="4" height="70" rx="2" fill="#10b981"/>
  <text x="620" y="312" font-family="-apple-system, Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Sector Overview</text>
  <text x="620" y="330" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#9ca3af">Lending, DEX, LST sectors.</text>
  <text x="620" y="346" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#9ca3af">Comparative format.</text>

  <!-- Bottom bar -->
  <line x1="60" y1="400" x2="840" y2="400" stroke="#374151" stroke-width="1"/>

  <text x="80" y="428" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#6b7280">Outputs saved to</text>
  <text x="188" y="428" font-family="'Courier New', monospace" font-size="11" fill="#c8a43a">./reports/</text>
  <text x="270" y="428" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#6b7280">as</text>
  <text x="295" y="428" font-family="'Courier New', monospace" font-size="11" fill="#c8a43a">.md</text>
  <text x="325" y="428" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#6b7280">or</text>
  <text x="350" y="428" font-family="'Courier New', monospace" font-size="11" fill="#c8a43a">.json</text>

  <text x="450" y="458" font-family="-apple-system, Arial, sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">QUILL  •  DEFI REPORT WRITER  •  POWERED BY CLAUDE AGENT SDK</text>
</svg>
