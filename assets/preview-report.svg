<svg width="900" height="540" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540">
  <defs>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fffef9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5f4ee;stop-opacity:1"/>
    </linearGradient>
    <filter id="pageShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00000022"/>
    </filter>
    <filter id="tagShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Outer background -->
  <rect width="900" height="540" fill="#2d3748"/>

  <!-- Paper page -->
  <rect x="60" y="30" width="780" height="480" rx="4" fill="url(#paperGrad)" filter="url(#pageShadow)"/>

  <!-- Newspaper top masthead -->
  <rect x="60" y="30" width="780" height="70" rx="4" fill="#1a1a2e"/>
  <rect x="60" y="84" width="780" height="4" fill="#c8a43a"/>

  <text x="450" y="64" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="4">QUILL</text>
  <text x="450" y="80" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#c8a43a" text-anchor="middle" letter-spacing="3">SOLANA DEFI INTELLIGENCE  •  WEEKLY DIGEST</text>

  <!-- Issue line -->
  <line x1="80" y1="102" x2="820" y2="102" stroke="#c8a43a40" stroke-width="1"/>
  <text x="80" y="116" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#6b5c3a">Vol. 12, Issue 14  •  April 4, 2026</text>
  <text x="820" y="116" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#6b5c3a" text-anchor="end">Powered by Claude</text>
  <line x1="80" y1="122" x2="820" y2="122" stroke="#c8a43a40" stroke-width="1"/>

  <!-- === MAIN HEADLINE === -->
  <text x="80" y="158" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="bold" fill="#111118">Solana DeFi TVL Climbs to</text>
  <text x="80" y="190" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="bold" fill="#111118">$4.8B, Kamino Leads Gainers</text>
  <line x1="80" y1="202" x2="820" y2="202" stroke="#c8a43a" stroke-width="2"/>

  <!-- === 3-COLUMN LAYOUT === -->

  <!-- Column 1 -->
  <text x="80" y="224" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1a2e" font-weight="bold" letter-spacing="2">TVL OVERVIEW</text>
  <text x="80" y="242" font-family="Georgia, serif" font-size="12" fill="#374151">Total tracked TVL across</text>
  <text x="80" y="258" font-family="Georgia, serif" font-size="12" fill="#374151">Solana protocols reached</text>
  <text x="80" y="274" font-family="Georgia, serif" font-size="12" fill="#374151">$4.82B this week, a +6.3%</text>
  <text x="80" y="290" font-family="Georgia, serif" font-size="12" fill="#374151">increase from the prior</text>
  <text x="80" y="306" font-family="Georgia, serif" font-size="12" fill="#374151">seven days. Kamino led</text>
  <text x="80" y="322" font-family="Georgia, serif" font-size="12" fill="#374151">all gainers at +18.2%.</text>
  <text x="80" y="354" font-family="Georgia, serif" font-size="11" fill="#6b7280">Kamino .......... $1.21B</text>
  <text x="80" y="370" font-family="Georgia, serif" font-size="11" fill="#6b7280">MarginFi ......... $890M</text>
  <text x="80" y="386" font-family="Georgia, serif" font-size="11" fill="#6b7280">Marinade ........ $742M</text>
  <text x="80" y="402" font-family="Georgia, serif" font-size="11" fill="#6b7280">Jupiter ......... $580M</text>
  <text x="80" y="418" font-family="Georgia, serif" font-size="11" fill="#6b7280">Drift ........... $421M</text>

  <!-- Vertical rule 1 -->
  <line x1="308" y1="212" x2="308" y2="460" stroke="#c8a43a40" stroke-width="1"/>

  <!-- Column 2 -->
  <text x="325" y="224" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1a2e" font-weight="bold" letter-spacing="2">TOKEN PERFORMANCE</text>
  <text x="325" y="242" font-family="Georgia, serif" font-size="12" fill="#374151">SOL broke above $190 on</text>
  <text x="325" y="258" font-family="Georgia, serif" font-size="12" fill="#374151">Tuesday before pulling back</text>
  <text x="325" y="274" font-family="Georgia, serif" font-size="12" fill="#374151">to $184. JUP outperformed</text>
  <text x="325" y="290" font-family="Georgia, serif" font-size="12" fill="#374151">with a +14.2% weekly gain,</text>
  <text x="325" y="306" font-family="Georgia, serif" font-size="12" fill="#374151">aided by fee-sharing vote</text>
  <text x="325" y="322" font-family="Georgia, serif" font-size="12" fill="#374151">passing with 94% approval.</text>

  <!-- Mini price table -->
  <rect x="325" y="336" width="230" height="92" rx="4" fill="#1a1a2e08" stroke="#c8a43a30" stroke-width="1"/>
  <text x="336" y="354" font-family="'Courier New', monospace" font-size="10" fill="#6b5c3a">TOKEN  PRICE    7D CHG</text>
  <line x1="336" y1="360" x2="544" y2="360" stroke="#c8a43a40" stroke-width="1"/>
  <text x="336" y="375" font-family="'Courier New', monospace" font-size="10" fill="#374151">SOL   $184.20  </text>
  <text x="480" y="375" font-family="'Courier New', monospace" font-size="10" fill="#16a34a">+4.1%</text>
  <text x="336" y="391" font-family="'Courier New', monospace" font-size="10" fill="#374151">JUP    $1.42  </text>
  <text x="480" y="391" font-family="'Courier New', monospace" font-size="10" fill="#16a34a">+14.2%</text>
  <text x="336" y="407" font-family="'Courier New', monospace" font-size="10" fill="#374151">JTO    $3.18  </text>
  <text x="480" y="407" font-family="'Courier New', monospace" font-size="10" fill="#ef4444">-2.7%</text>
  <text x="336" y="423" font-family="'Courier New', monospace" font-size="10" fill="#374151">MSOL  $209.44  </text>
  <text x="480" y="423" font-family="'Courier New', monospace" font-size="10" fill="#16a34a">+4.3%</text>

  <!-- Vertical rule 2 -->
  <line x1="568" y1="212" x2="568" y2="460" stroke="#c8a43a40" stroke-width="1"/>

  <!-- Column 3 -->
  <text x="585" y="224" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1a2e" font-weight="bold" letter-spacing="2">WEEK'S NARRATIVE</text>
  <text x="585" y="242" font-family="Georgia, serif" font-size="12" fill="#374151">The standout story this</text>
  <text x="585" y="258" font-family="Georgia, serif" font-size="12" fill="#374151">week is Kamino's surge.</text>
  <text x="585" y="274" font-family="Georgia, serif" font-size="12" fill="#374151">A new yield strategy for</text>
  <text x="585" y="290" font-family="Georgia, serif" font-size="12" fill="#374151">leveraged LST positions</text>
  <text x="585" y="306" font-family="Georgia, serif" font-size="12" fill="#374151">attracted $180M in fresh</text>
  <text x="585" y="322" font-family="Georgia, serif" font-size="12" fill="#374151">deposits in under 72h.</text>
  <text x="585" y="354" font-family="Georgia, serif" font-size="12" fill="#374151">DEX volume held strong</text>
  <text x="585" y="370" font-family="Georgia, serif" font-size="12" fill="#374151">at $2.4B/day, with Orca</text>
  <text x="585" y="386" font-family="Georgia, serif" font-size="12" fill="#374151">and Jupiter splitting the</text>
  <text x="585" y="402" font-family="Georgia, serif" font-size="12" fill="#374151">bulk of routed volume.</text>
  <text x="585" y="424" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#9ca3af">Generated by Quill</text>

  <!-- Bottom divider + TL;DR -->
  <line x1="80" y1="462" x2="820" y2="462" stroke="#c8a43a" stroke-width="1.5"/>
  <text x="80" y="480" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#1a1a2e">TL;DR:</text>
  <text x="130" y="480" font-family="Georgia, serif" font-size="11" fill="#374151">TVL up 6.3%. Kamino surges 18%. JUP best token. DEX volume steady at $2.4B/day.</text>
  <text x="820" y="480" font-family="Georgia, serif" font-size="10" fill="#9ca3af" text-anchor="end">502 words</text>

  <line x1="80" y1="488" x2="820" y2="488" stroke="#c8a43a40" stroke-width="1"/>
  <text x="450" y="504" font-family="Georgia, serif" font-size="10" fill="#9ca3af" text-anchor="middle">quill.defi  •  MIT License  •  github.com/QuillReports/Quill</text>
</svg>
